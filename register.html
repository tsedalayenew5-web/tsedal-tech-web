<body>
    <h1 class="rg-h">Register For <i>Tsedal</i> Tech Institute</h1> 
    <div>
        <form action="login.html" class="form">
        <label for="name">Full Name </label>
        <input  id="name" placeholder="your full name" required>
        <br>
        <label for="age">Age</label>
        <input id="age" type="number" placeholder="Your Age" required>
        <br>
        <label for="email">Email Address</label>
        <input id="email" type="email" placeholder="exa@gmail.com" required>
        <br>
        <label for="phone-number">Phone Number</label>
        <input id="phone-number" type="tel" placeholder="Your Phone Number" required>
        <br>
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="Username" required>
        <br>
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="********" required>
        <br>
        <button type="submit">Register</button>
    </form>
